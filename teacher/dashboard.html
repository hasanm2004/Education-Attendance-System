<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Teacher Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

  <h2 class="text-center mb-4">
    👨‍🏫 Teacher Dashboard
  </h2>

  <div class="card shadow p-4">

    <div class="d-flex gap-2 mb-3">


      <button
     onclick="window.location.href='qr-generator.html'"
       class="btn btn-success">
        Generate QR
            </button>


            <button
onclick="location.href='profile.html'"
class="btn btn-info">
👤 Profile
</button>

<button
onclick="location.href='attendance.html'"
class="btn btn-warning">
📋 Attendance
</button>

<button
onclick="location.href='reports.html'"
class="btn btn-success">
📊 Reports
</button>

<button
onclick="location.href='qr-generator.html'"
class="btn btn-dark">
📱 Generate QR
</button>

      <button
        onclick="loadAttendance()"
        class="btn btn-primary">
        📋 Load Attendance
      </button>

      <button
        onclick="toggleTheme()"
        class="btn btn-dark">
        🌙 Dark Mode
      </button>

      <button
        onclick="logout()"
        class="btn btn-danger">
        🚪 Logout
      </button>

    </div>

    <table class="table table-striped table-bordered">

      <thead class="table-dark">

        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Semester</th>
          <th>Status</th>
          <th>Date</th>
        </tr>

      </thead>

      <tbody id="attendanceBody">

      </tbody>

    </table>

  </div>

</div>

<!-- Session Check -->
<script type="module" src="../js/session.js"></script>

<!-- Teacher JS -->
<script type="module" src="../js/teacher.js"></script>

<!-- Theme JS -->
<script src="../js/theme.js"></script>

</body>
</html>
