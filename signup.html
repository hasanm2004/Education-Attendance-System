<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name"><br><br>

  <input type="text" id="SeatNo" placeholder="Seat Number"><br><br>

  <input type="text" id="Class / Year " placeholder="Class / Year"><br><br>

  <input type="email" id="email" placeholder="Email"><br><br>

  <input type="password" id="password" placeholder="Password"><br><br>

  <input type="password" id="confirmPassword" placeholder="Confirm Password"><br><br>

  <input type="text" id="semester" placeholder="Semester"><br><br>

  <button onclick="signup()">Create Account</button>

  <br>

  <p>
  Already have an account?
  <a href="login.html">Login Here</a>
</p>

</div>

<script type="module" src="js/auth.js"></script>
<script src="js/theme.js"></script>

<script>
function goLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
