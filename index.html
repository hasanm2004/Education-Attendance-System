<!DOCTYPE html>
<html>
<head>
  <title>Education Attendance System</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <h1>Education Attendance System</h1>

  <h3>Department of Education</h3>
  <h3>University of Karachi</h3>

  <h2>Who are you?</h2>

  <button onclick="goSignup('teacher')">Teacher</button>
  <button onclick="goSignup('student')">Student</button>

</div>

<script>
function goSignup(role) {
  localStorage.setItem("role", role);
  window.location.href = "signup.html";
}
</script>

</body>
</html>
