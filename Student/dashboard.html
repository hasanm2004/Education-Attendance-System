 <!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Student Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-5">

  <h2 class="text-center mb-4">
    🎓 Student Dashboard
  </h2>

  <p id="welcome" class="text-center"></p>

  <div class="card shadow p-4">

    <div class="d-grid gap-2">

      <button onclick="scanQR()" class="btn btn-warning">
        📱 Scan QR
      </button>
      <div id="reader" style="width:300px;"></div>

      <button onclick="markAttendance()" class="btn btn-primary">
        📍 Mark Attendance
      </button>
        
        <button
        onclick="location.href='attendance.html'"
         class="btn btn-warning">
     📅 My Attendance
      </button>
       

      <button onclick="captureFace()" class="btn btn-info">
        📸 Capture Face
      </button>

      <button
        onclick="location.href='profile.html'"
        class="btn btn-info">
        👤 Profile
            </button>

      <button onclick="generatePDF()" class="btn btn-success">
        📄 Download Report
      </button>

      <button onclick="calculateAttendance()" class="btn btn-secondary">
        📊 Calculate Attendance %
      </button>

      <button onclick="loadHistory()" class="btn btn-dark">
        📜 Load History
      </button>
          
      <button
       onclick="location.href='history.html'"
      class="btn btn-secondary">
         📚 Attendance History
        </button>

             <button
             onclick="location.href='reports.html'"
              class="btn btn-info">
             📊 Reports
              </button>

      <button onclick="toggleTheme()" class="btn btn-outline-dark">
        🌙 Dark Mode
      </button>

      <button onclick="logout()" class="btn btn-danger">
        🚪 Logout
      </button>

    </div>

  </div>

  <div class="card shadow p-3 mt-4">

    <h4>Attendance Percentage</h4>

    <h3 id="percentage">0%</h3>

  </div>

  <div class="card shadow p-3 mt-4">

    <h4>Attendance History</h4>

    <div id="history">
      No records found
    </div>

  </div>

  <div class="card shadow p-3 mt-4">

    <h4>Attendance Analytics</h4>

    <canvas id="chart"></canvas>

  </div>

</div>

<!-- Session Check -->
<script type="module" src="../js/session.js"></script>

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Student JS -->
<script type="module" src="../js/student.js"></script>

<!-- Theme -->
<script src="../js/theme.js"></script>

<!-- QR -->
<script src="../js/qr.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Face API -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

</body>
</html>
