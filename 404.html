<!DOCTYPE html>
<html>
<head>
  <title>Page Not Found</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6fb;
      padding-top: 100px;
    }

    h1 {
      font-size: 50px;
      color: #ff4d4d;
    }

    p {
      font-size: 18px;
      color: #555;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    a:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <h1>404</h1>
  <p>Oops! Page Not Found</p>
  <p>The page you are looking for does not exist.</p>

  <a href="/index.html">Go Back Home</a>

</body>
</html>
